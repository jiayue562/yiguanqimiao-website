# 教员方法论 · 触发规则

> 🔔 自动触发配置 · 2026-04-16

---

## P0 直接触发（权重 5）

```yaml
trigger_type: direct
weight: 5
auto_activate: true

keywords:
  - "教员方法论"
  - "矛盾分析"
  - "主要矛盾"
  - "根本矛盾"
  - "阶段矛盾"
  - "矛盾的主要方面"
  - "主次矛盾转化"
  - "找装填"
  - "找成熟模型"
  - "改装框架"
  - "填入现实"

patterns:
  - "帮我分析.*矛盾"
  - ".*主要矛盾是什么"
  - ".*根本矛盾是什么"
  - "如何找到.*问题"
  - ".*问题怎么解决"
  - "目标.*矛盾"
  - "阶段.*矛盾"
  - "矛盾转化条件"
```

