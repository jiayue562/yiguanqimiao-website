## P1 场景触发（权重 4）

```yaml
trigger_type: scenario
weight: 4
auto_activate: false
confirm_required: true

scenarios:
  - name: "问题分析"
    keywords:
      - "分析问题"
      - "问题出在哪里"
      - "问题根源"
      - "问题诊断"
      - "问题定位"
    
  - name: "方案制定"
    keywords:
      - "制定方案"
      - "解决方案"
      - "行动计划"
      - "如何实施"
      - "怎么做"
    
  - name: "实践复盘"
    keywords:
      - "复盘"
      - "总结"
      - "反思"
      - "经验教训"
      - "哪里出了问题"
    
  - name: "目标设定"
    keywords:
      - "目标"
      - "目的"
      - "想要达成"
      - "期望结果"
      - "KPI"
```

