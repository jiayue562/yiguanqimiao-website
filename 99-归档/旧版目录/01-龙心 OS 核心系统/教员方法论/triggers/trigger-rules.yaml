## P2 信号触发（权重 3）

```yaml
trigger_type: signal
weight: 3
auto_activate: false
suggest_only: true

signals:
  - pattern: "遇到.*困难"
    suggestion: "可以使用教员方法论分析困难背后的矛盾"
    
  - pattern: "不知道.*怎么办"
    suggestion: "可以使用教员方法论找到主要矛盾"
    
  - pattern: ".*走不通"
    suggestion: "可以向上找根本矛盾或向下走 PDCA 分析"
    
  - pattern: ".*瓶颈"
    suggestion: "可以使用矛盾分析找到瓶颈的根源"
    
  - pattern: ".*纠结"
    suggestion: "可以分析矛盾的主要方面帮助决策"
```

