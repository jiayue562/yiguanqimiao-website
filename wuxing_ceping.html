const ELEM_LABELS = { wood:'🌿 木', fire:'🔥 火', earth:'🌏 土', metal:'⚔️ 金', water:'💧 水' };

// ==================== STATE ====================
let answers = {};

// ==================== APP ====================
function startQuiz() {
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestions();
  updateProgress();
}

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  let html = '';
  ELEM_ORDER.forEach(elemKey => {
    const qs = QUESTIONS.filter(q => q.elem === elemKey);
    const elem = ELEMENTS[elemKey];
    let sectionClass = 'section-card';
    if (elemKey === 'wood') sectionClass += ' section-wood';
    if (elemKey === 'fire') sectionClass += ' section-fire';
    if (elemKey === 'earth') sectionClass += ' section-earth';
    if (elemKey === 'metal') sectionClass += ' section-metal';
    if (elemKey === 'water') sectionClass += ' section-water';

    html += `<div class="${sectionClass} fade-in">`;
    html += `<div class="section-header">`;
    html += `<span class="icon">${elem.icon}</span>`;
    html += `<h2>${elem.title}</h2>`;
    html += `<span class="yang-label">1-6阳 · 7-12阴</span>`;
    html += `</div>`;

    qs.forEach(q => {
      const tag = q.polarity === 'yang'
        ? '<span class="yang-tag">阳</span>'
        : '<span class="yin-tag">阴</span>';
      const checkedYes = answers[q.id] === true ? 'checked' : '';
      const checkedNo = answers[q.id] === false ? 'checked' : '';
      html += `<div class="question-item">`;
      html += `<span class="q-num">${q.id}</span>`;
      html += `<div class="q-text">${q.text} ${tag}</div>`;
      html += `<div class="q-options">`;
      html += `<label><input type="radio" name="q${q.id}" value="yes" ${checkedYes} onchange="answer(${q.id},true)"> 是</label>`;
      html += `<label><input type="radio" name="q${q.id}" value="no" ${checkedNo} onchange="answer(${q.id},false)"> 否</label>`;
      html += `</div></div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function answer(id, val) {
  answers[id] = val;
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = QUESTIONS.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = `已完成 ${answered}/${total} 题`;
  document.getElementById('counterInfo').textContent = `已完成 ${answered}/${total} 题`;
  document.getElementById('submitBtn').disabled = answered < total;
}

function calcScores() {
  const scores = {};
  ELEM_ORDER.forEach(e => scores[e] = 0);
  QUESTIONS.forEach(q => {
    if (answers[q.id]) scores[q.elem]++;
  });
  return scores;
}

function calcYinYang(scores) {
  const result = {};
  ELEM_ORDER.forEach(e => {
    const yangQ = QUESTIONS.filter(q => q.elem === e && q.polarity === 'yang');
    const yinQ = QUESTIONS.filter(q => q.elem === e && q.polarity === 'yin');
    const yangYes = yangQ.filter(q => answers[q.id]).length;
    const yinYes = yinQ.filter(q => answers[q.id]).length;
    let state;
    if (yangYes >= 4 && yinYes < 4) state = '阳性主导';
    else if (yinYes >= 4 && yangYes < 4) state = '阴性主导';
    else state = '平衡状态';
    result[e] = { yang: yangYes, yin: yinYes, state };
  });
  return result;
}

function showResults() {
  document.getElementById('quiz').classList.add('hidden');
  const container = document.getElementById('results');
  container.style.display = 'block';

  const scores = calcScores();
  const yy = calcYinYang(scores);
  const sorted = ELEM_ORDER.slice().sort((a,b) => scores[b] - scores[a]);
  const primary = sorted[0];
  const secondary = sorted[1];
  const tertiary = sorted[2];

  const elem = ELEMENTS[primary];
  const interp = INTERPRETATIONS[primary];

  let html = `<div class="result-hero result-type-${primary} fade-in">`;
  html += `<div class="big-icon">${elem.icon}</div>`;
  html += `<h2>${interp.title}</h2>`;
  html += `<div class="label">主行：${elem.name}行人 · 得分 ${scores[primary]}/12</div>`;
  html += `</div>`;

  html += `<div class="result-sub">`;
  html += `次行：${ELEM_LABELS[secondary]} ${scores[secondary]}分 · 第三行：${ELEM_LABELS[tertiary]} ${scores[tertiary]}分`;
  html += `</div>`;

  // Score bars
  html += `<div class="result-card fade-in"><h3>📊 五行得分</h3>`;
  ELEM_ORDER.forEach(e => {
    const pct = (scores[e] / 12) * 100;
    const label = ELEM_LABELS[e];
    const isPrimary = e === primary ? ' ★ 主行' : '';
    html += `<div class="score-bar-wrap">`;
    html += `<div class="score-bar-label"><span>${label}${isPrimary}</span><span>${scores[e]}/12</span></div>`;
    html += `<div class="score-bar"><div class="score-bar-fill fill-${e}" style="width:${pct}%">${scores[e]}</div></div>`;
    html += `</div>`;
  });
  html += `</div>`;

  // Yin-Yang
  html += `<div class="result-card fade-in"><h3>☯ 阴阳状态（进阶分析）</h3>`;
  html += `<div class="yin-yang-grid">`;
  ELEM_ORDER.forEach(e => {
    const d = yy[e];
    const bgClass = d.state === '阳性主导' ? 'yin-yang-positive' : d.state === '阴性主导' ? 'yin-yang-negative' : 'yin-yang-balanced';
    html += `<div class="yin-yang-item ${bgClass}">`;
    html += `<div class="label">${ELEM_LABELS[e]}</div>`;
    html += `<div class="val">${d.yang}阳 / ${d.yin}阴</div>`;
    html += `<div style="font-size:12px">${d.state}</div>`;
    html += `</div>`;
  });
  html += `</div></div>`;

  // Interpretation
  html += `<div class="result-card fade-in"><h3>📖 类型画像</h3><p style="font-size:14px;line-height:1.8">${interp.description}</p></div>`;

  html += `<div class="result-card fade-in"><h3>⭐ 核心优势</h3><ul>`;
  interp.strengths.forEach(s => html += `<li>${s}</li>`);
  html += `</ul></div>`;

  html += `<div class="result-card fade-in"><h3>⚠️ 需要注意</h3><ul>`;
  interp.cautions.forEach(s => html += `<li>${s}</li>`);
  html += `</ul></div>`;

  html += `<div class="result-card fade-in"><h3>💡 阴阳状态说明</h3><p style="font-size:14px;line-height:1.8">${interp.yinDesc}</p></div>`;

  html += `<div class="result-card fade-in"><h3>🌱 成长建议</h3><ul>`;
  interp.suggestions.forEach(s => html += `<li>${s}</li>`);
  html += `</ul></div>`;

  html += `<div class="result-card fade-in"><h3>📚 学习风格</h3><p style="font-size:14px;line-height:1.8">${interp.study}</p></div>`;

  html += `<div class="result-card fade-in"><h3>🤝 人际关系特点</h3><p style="font-size:14px;line-height:1.8">${interp.social}</p></div>`;

  html += `<div class="result-card fade-in"><h3>🔭 未来职业方向参考</h3><p style="font-size:14px;color:var(--text-light);margin-bottom:8px">（仅供思考）</p>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:8px">`;
  interp.careers.forEach(c => html += `<span style="background:#f0f0f0;padding:4px 14px;border-radius:16px;font-size:13px">${c}</span>`);
  html += `</div></div>`;

  // Combo
  const comboKey1 = primary + '+' + secondary;
  const comboKey2 = secondary + '+' + primary;
  const comboText = COMBOS[comboKey1] || COMBOS[comboKey2] || '';
  if (comboText) {
    html += `<div class="result-card fade-in"><h3>🔗 ${ELEMENTS[primary].icon}${ELEMENTS[primary].name} + ${ELEMENTS[secondary].icon}${ELEMENTS[secondary].name} 次行组合解读</h3>`;
    html += `<p style="font-size:14px;line-height:1.8">${comboText}</p></div>`;
  }

  // Watermark
  html += `<div style="text-align:center;padding:20px 0;font-size:13px;color:var(--text-light)">`;
  html += `以观其妙书院 · 五行人格心理学<br>仅供个人成长参考，版权所有`;
  html += `</div>`;

  html += `<button class="btn-restart" onclick="restart()">重新测评</button>`;

  container.innerHTML = html;
  container.scrollIntoView({ behavior:'smooth' });
}

function restart() {
  answers = {};
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('progress-bar').style.width = '0%';
}
</script>
</body>
</html>
