name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: c1965573a5f89d696d011372a7cd0c9e
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=yiguanqimiao-website --branch=main
