## 排除规则

```yaml
exclude_rules:
  - 场景：简单问答
    关键词：["是什么", "什么时候", "在哪里"]
    处理：不触发，直接回答事实性问题
    
  - 场景：闲聊
    关键词：["你好", "谢谢", "再见", "哈哈"]
    处理：不触发，自然对话
    
  - 场景：紧急问题
    关键词：["紧急", "马上", "立刻", "急"]
    处理：不触发，先给快速建议
    
  - 场景：纯技术问题
    关键词：["代码", "bug", "配置", "报错"]
    处理：不触发，建议用技术方法解决
```

