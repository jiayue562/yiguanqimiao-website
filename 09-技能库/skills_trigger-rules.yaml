  - 前置 Skill: 象思维
    条件：S3 创意创新场景
    动作：先调用象思维，再调用龙脑 OS
    
  - 前置 Skill: 知识学习
    条件：S2 深度理解/S7 知识编译场景
    动作：先调用知识学习，再调用龙脑 OS
    
  - 后置 Skill: 五色光思维
