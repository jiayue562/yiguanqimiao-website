## 🚦 人工确认规则

```yaml
manual_confirm:
  # 需要确认的情况
  require_confirm:
    - condition: "涉及重大决策（职业转型、创业等）"
      reason: "重大决策需要用户明确确认"
    
    - condition: "多 Skill 协同（≥3 个 Skill）"
      reason: "避免过度分析，确认用户需要"
    
    - condition: "用户历史偏好简单直接"
      reason: "尊重用户偏好"
  
  # 确认话术模板
  confirm_template: |
    检测到您可能需要深度分析，建议调用以下 Skills：
    
    1. [Skill 1]：[功能]
    2. [Skill 2]：[功能]
    3. [Skill 3]：[功能]
    
    预计耗时：[X] 分钟
    输出：[具体成果]
    
    是否继续？（是/否/简化版）
```

