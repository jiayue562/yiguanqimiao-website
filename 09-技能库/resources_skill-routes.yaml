## 📋 调用顺序规则

### 场景 1：新概念学习 + 落地

```
1. 知识学习 Skill → 2. 知行合一 Skill → 3. 人机协同五象限 Skill
   ↓                    ↓                    ↓
 理解概念              转化为方案            执行方案
```

**触发条件**：用户首次接触某概念，需要学习并落地

---

### 场景 2：深度分析 + 落地

```
1. 象思维 Skill → 2. 知行合一 Skill → 3. 人机协同五象限 Skill
   ↓                ↓                    ↓
 观象洞察          落地转化              执行方案
```

**触发条件**：需要深度洞察概念本质后再落地

---

### 场景 3：多角度分析 + 落地

```
1. 五色光思维 Skill → 2. 知行合一 Skill → 3. 人机协同五象限 Skill
   ↓                    ↓                    ↓
 五色光分析            落地转化              执行方案
```

**触发条件**：需要从红/黄/绿/蓝/白五色光多角度分析

---

### 场景 4：直接落地

```
知行合一 Skill → 人机协同五象限 Skill
   ↓                ↓
 落地方案          执行方案
```

**触发条件**：用户已理解概念，只需要落地方案

---

## 🎯 自动路由规则

```yaml
auto_routing:
  # 规则 1：概念学习场景
  rule_1:
    condition: "用户询问.*是什么.*并且.*怎么做"
    route:
      - 知识学习 Skill
      - 知行合一 Skill
      - 人机协同五象限 Skill
    auto_activate: true
  
  # 规则 2：深度分析场景
  rule_2:
    condition: "用户询问.*本质.*深层.*洞察"
    route:
      - 象思维 Skill
      - 知行合一 Skill
      - 人机协同五象限 Skill
    auto_activate: true
  
  # 规则 3：多角度分析场景
  rule_3:
    condition: "用户询问.*多角度.*全面.*分析"
    route:
      - 五色光思维 Skill
      - 知行合一 Skill
      - 人机协同五象限 Skill
    auto_activate: false  # 需要用户确认
  
  # 规则 4：直接落地场景
  rule_4:
    condition: "用户已理解概念.*直接.*落地.*方案"
    route:
      - 知行合一 Skill
      - 人机协同五象限 Skill
    auto_activate: true
```

