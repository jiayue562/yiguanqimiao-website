## 📊 协同效果评估

```yaml
evaluation:
  # 评估指标
  metrics:
    - 方案完整性：知行合一输出的方案是否完整
    - 执行成功率：人机协同五象限执行的成功率
    - 用户满意度：用户对协同流程的满意度
    - 时间效率：从概念到执行的总耗时
  
  # 评估周期
  cycle: "weekly"
  
  # 优化方向
  optimization:
    - 减少不必要的 Skill 调用
    - 优化 Skill 间信息传递
    - 提升协同流程的流畅度
```

