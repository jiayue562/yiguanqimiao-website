## 前置 Skill 路由

### 知识学习 → 象思维

**路由条件**:
- 用户刚完成知识学习 Skill 分析
- 用户询问"如何应用/创新/落地"
- 问题类型从理解转向创造

**触发词**:
- "学完了，怎么创新？"
- "基于这个理论，有什么新想法？"
- "如何应用这个知识？"
- "有什么创新的应用场景？"

**路由动作**: 
```json
{
  "action": "recommend",
  "message": "已完成深度学习，现在需要用象思维进行创新突破吗？",
  "autoActivate": false
}
```

