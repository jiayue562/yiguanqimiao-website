## 循环路由

### 象思维 ↔ 知行合一

**场景**: 创意→执行→反馈→优化创意的迭代循环

**循环条件**:
- 执行遇到瓶颈
- 需要重新思考方向
- 方案需要调整

**触发词**:
- "执行遇到困难，需要重新思考"
- "方案不太对，换个思路"
- "卡住了，需要新创意"

**路由动作**:
```json
{
  "action": "loopBack",
  "message": "执行遇到瓶颈，回到象思维重新思考方向",
  "preserveContext": true
}
```

---

## 路由优先级

### 高优先级 (自动激活)
1. 象思维 → 知行合一 (创意需要落地)
2. 易经思维 → 象思维 (卦象需要转化)

### 中优先级 (询问确认)
1. 知识学习 → 象思维 (学习后创新)
2. 五色光思维 → 象思维 (分析后创造)
3. 象思维 → 人机协同五象限 (人机分工)

### 低优先级 (建议)
1. 象思维 → 知识学习 (补充知识)
2. 象思维 → 五色光思维 (多角度验证)

