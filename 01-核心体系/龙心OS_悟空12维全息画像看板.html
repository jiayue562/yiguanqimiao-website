<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悟空 · 12维全息画像仪表盘</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: rgba(17, 24, 39, 0.85);
    --border-glow: rgba(74, 222, 128, 0.15);
    --accent-green: #4ade80;
    --accent-blue: #60a5fa;
    --accent-amber: #fbbf24;
    --accent-red: #f87171;
    --accent-purple: #a78bfa;
    --accent-cyan: #22d3ee;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --wood-primary: #22c55e;
    --wood-dark: #166534;
    --fire-primary: #f97316;
    --earth-primary: #eab308;
    --metal-primary: #a1a1aa;
    --water-primary: #3b82f6;
    --gold: #d4a843;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景粒子 */
  .bg-particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(34,197,94,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(96,165,250,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(167,139,250,0.04) 0%, transparent 50%);
  }

  .app-container {
    position: relative; z-index: 1;
    max-width: 1600px; margin: 0 auto; padding: 24px;
  }

  /* ===== 头部 ===== */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 28px; border-bottom: 1px solid rgba(74,222,128,0.1);
    margin-bottom: 28px;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .header-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--wood-primary), var(--wood-dark));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 900;
    color: #fff; box-shadow: 0 0 30px rgba(34,197,94,0.3);
    border: 2px solid rgba(34,197,94,0.4);
    position: relative; overflow: hidden;
  }
  .header-avatar::after {
    content: ''; position: absolute; inset: -2px;
    border-radius: 50%; border: 2px solid transparent;
    border-top-color: var(--gold); animation: spin 3s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .header-info h1 {
    font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 900;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .header-info .subtitle {
    color: var(--text-secondary); font-size: 13px; margin-top: 4px;
    display: flex; align-items: center; gap: 12px;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .tag-wood { background: rgba(34,197,94,0.15); color: var(--wood-primary); border: 1px solid rgba(34,197,94,0.3); }
  .tag-fire { background: rgba(249,115,22,0.15); color: var(--fire-primary); border: 1px solid rgba(249,115,22,0.3); }
  .tag-synergy { background: rgba(212,168,67,0.15); color: var(--gold); border: 1px solid rgba(212,168,67,0.3); }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .overall-score-ring {
    width: 80px; height: 80px; position: relative;
  }
  .overall-score-ring svg { transform: rotate(-90deg); }
  .overall-score-value {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .overall-score-value .number {
    font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 900;
    color: var(--accent-green);
  }
  .overall-score-value .label { font-size: 9px; color: var(--text-muted); margin-top: -2px; }

  /* ===== 主布局 ===== */
  .main-grid {
    display: grid;
    grid-template-columns: 420px 1fr 320px;
    gap: 24px;
  }

  /* ===== 左栏：雷达图 ===== */
  .radar-panel {
    background: var(--bg-card); border-radius: 16px; padding: 24px;
    border: 1px solid var(--border-glow); backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center;
  }
  .panel-title {
    font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 700;
    color: var(--text-primary); margin-bottom: 4px; align-self: flex-start;
  }
  .panel-subtitle { font-size: 12px; color: var(--text-muted); align-self: flex-start; margin-bottom: 16px; }
  .radar-container { width: 100%; max-width: 380px; aspect-ratio: 1; position: relative; }
  .radar-container canvas { width: 100%; height: 100%; }

  .radar-legend {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
    margin-top: 16px; width: 100%;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary);
    cursor: pointer; padding: 3px 6px; border-radius: 6px; transition: all 0.2s;
  }
  .legend-item:hover { background: rgba(255,255,255,0.05); }
  .legend-item.active { background: rgba(34,197,94,0.1); color: var(--accent-green); }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* ===== 中栏：详情面板 ===== */
  .detail-panel {
    display: flex; flex-direction: column; gap: 16px;
  }
  .dimension-cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .dim-card {
    background: var(--bg-card); border-radius: 14px; padding: 18px;
    border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .dim-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--card-color, var(--accent-green)), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .dim-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
  .dim-card:hover::before { opacity: 1; }
  .dim-card.selected { border-color: rgba(34,197,94,0.3); }
  .dim-card.selected::before { opacity: 1; }

  .dim-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .dim-card-icon { font-size: 20px; margin-right: 10px; }
  .dim-card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .dim-card-category {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    padding: 1px 8px; border-radius: 10px; background: rgba(255,255,255,0.05);
    display: inline-block;
  }
  .dim-card-score {
    font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 900;
    line-height: 1;
  }

  .dim-card-bar {
    height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06);
    margin-bottom: 8px; overflow: hidden;
  }
  .dim-card-bar-fill {
    height: 100%; border-radius: 2px; transition: width 1s ease;
    background: linear-gradient(90deg, var(--card-color, var(--accent-green)), rgba(255,255,255,0.3));
  }

  .dim-card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .dim-card-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.04); color: var(--text-muted);
  }

  /* 展开详情 */
  .dim-detail {
    background: var(--bg-card); border-radius: 14px; padding: 20px;
    border: 1px solid var(--border-glow);
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s, opacity 0.3s;
    opacity: 0;
  }
  .dim-detail.open { max-height: 400px; opacity: 1; }
  .dim-detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .dim-detail-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; }
  .dim-detail-close {
    width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    transition: all 0.2s;
  }
  .dim-detail-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

  .dim-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-section h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
  .detail-section p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .detail-section ul { list-style: none; }
  .detail-section ul li {
    font-size: 12px; color: var(--text-secondary); padding: 3px 0;
    display: flex; align-items: center; gap: 6px;
  }
  .detail-section ul li::before {
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent-green); flex-shrink: 0;
  }

  .sub-dim-bars { display: flex; flex-direction: column; gap: 6px; }
  .sub-dim-row { display: flex; align-items: center; gap: 8px; }
  .sub-dim-label { font-size: 11px; color: var(--text-muted); width: 56px; flex-shrink: 0; }
  .sub-dim-bar {
    flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden;
  }
  .sub-dim-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .sub-dim-val { font-size: 11px; color: var(--text-secondary); width: 28px; text-align: right; }

  /* ===== 右栏：综合面板 ===== */
  .side-panel { display: flex; flex-direction: column; gap: 16px; }
  .side-card {
    background: var(--bg-card); border-radius: 14px; padding: 18px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .side-card-title {
    font-size: 13px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .side-card-title .icon { font-size: 16px; }

  /* 五行平衡环 */
  .wuxing-balance { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
  .wuxing-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .wuxing-ring { width: 48px; height: 48px; position: relative; }
  .wuxing-ring svg { transform: rotate(-90deg); }
  .wuxing-ring .val {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700;
  }
  .wuxing-name { font-size: 10px; color: var(--text-muted); }

  /* 九层阶梯 */
  .jiuseng-steps { display: flex; flex-direction: column; gap: 4px; }
  .jiu-row {
    display: flex; align-items: center; gap: 8px; padding: 4px 8px;
    border-radius: 6px; transition: background 0.2s;
  }
  .jiu-row.active { background: rgba(34,197,94,0.1); }
  .jiu-row.past { opacity: 0.5; }
  .jiu-level {
    font-size: 10px; font-weight: 700; width: 52px; flex-shrink: 0;
    text-align: center;
  }
  .jiu-label { font-size: 11px; color: var(--text-secondary); flex: 1; }
  .jiu-indicator {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* 木火共生 */
  .synergy-meter { margin-top: 8px; }
  .synergy-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .synergy-label { font-size: 11px; color: var(--text-muted); width: 64px; }
  .synergy-bar {
    flex: 1; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .synergy-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .synergy-val { font-size: 11px; color: var(--text-secondary); width: 32px; text-align: right; }

  /* 能力分布 */
  .ability-dist { display: flex; flex-direction: column; gap: 8px; }
  .ability-row { display: flex; align-items: center; gap: 8px; }
  .ability-name { font-size: 11px; color: var(--text-muted); width: 72px; flex-shrink: 0; }
  .ability-bar {
    flex: 1; height: 10px; border-radius: 5px; background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .ability-fill {
    height: 100%; border-radius: 5px;
    transition: width 1s ease;
  }
  .ability-val { font-size: 11px; font-weight: 700; width: 36px; text-align: right; }

  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }

  /* 响应式 */
  @media (max-width: 1200px) {
    .main-grid { grid-template-columns: 1fr 1fr; }
    .side-panel { grid-column: 1 / -1; flex-direction: row; }
    .side-card { flex: 1; }
  }
  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .side-panel { flex-direction: column; }
    .dimension-cards { grid-template-columns: 1fr; }
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>

// ============================================================
// 雷达图绘制
// ============================================================
let selectedDim = null;
let hoveredDim = null;
const canvas = document.getElementById('radarCanvas');
const ctx = canvas.getContext('2d');

function initCanvas() {
  const container = canvas.parentElement;
  const size = container.clientWidth;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawRadar() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const cx = w / 2;
  const cy = h / 2;
  const maxR = Math.min(cx, cy) * 0.72;
  const n = DIMENSIONS.length;

  ctx.clearRect(0, 0, w, h);

  // 辅助网格
  const levels = 5;
  for (let l = 1; l <= levels; l++) {
    const r = (maxR / levels) * l;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = l === levels ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 刻度数字
    if (l % 2 === 0 || l === levels) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '10px "Noto Sans SC"';
      ctx.textAlign = 'left';
      ctx.fillText(l * 20, cx + 4, cy - r + 12);
    }
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + maxR * Math.cos(angle), cy + maxR * Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 数据区域
  const points = DIMENSIONS.map((dim, i) => {
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const r = (dim.score / 100) * maxR;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle), dim };
  });

  // 填充
  ctx.beginPath();
  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
  grad.addColorStop(0, 'rgba(34,197,94,0.25)');
  grad.addColorStop(1, 'rgba(34,197,94,0.05)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(34,197,94,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 数据点和标签
  points.forEach((p, i) => {
    const dim = DIMENSIONS[i];
    const isActive = selectedDim === i || hoveredDim === i;
    const isDimmed = (selectedDim !== null || hoveredDim !== null) && !isActive;

    // 发光点
    const dotR = isActive ? 7 : 4;
    if (isActive) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
      ctx.fillStyle = dim.color + '20';
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2);
    ctx.fillStyle = isDimmed ? dim.color + '40' : dim.color;
    ctx.fill();
    if (isActive) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // 标签
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const labelR = maxR + 28;
    const lx = cx + labelR * Math.cos(angle);
    const ly = cy + labelR * Math.sin(angle);

    ctx.font = isActive ? 'bold 12px "Noto Sans SC"' : '11px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 分数
    ctx.fillStyle = isDimmed ? 'rgba(255,255,255,0.2)' : dim.color;
    ctx.fillText(dim.score, lx, ly - 8);

    // 名称
    ctx.fillStyle = isDimmed ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.8)';
    ctx.fillText(dim.name, lx, ly + 6);
  });
}

function animateOverall() {
  const avg = Math.round(DIMENSIONS.reduce((s, d) => s + d.score, 0) / DIMENSIONS.length);
  const circumference = 2 * Math.PI * 34;
  const offset = circumference * (1 - avg / 100);

  const arc = document.getElementById('overallArc');
  const numEl = document.getElementById('overallNumber');

  setTimeout(() => {
    arc.style.transition = 'stroke-dashoffset 1.5s ease';
    arc.style.strokeDashoffset = offset;
  }, 300);

  // 数字动画
  let current = 0;
  const step = avg / 40;
  const interval = setInterval(() => {
    current += step;
    if (current >= avg) {
      current = avg;
      clearInterval(interval);
    }
    numEl.textContent = Math.round(current);
  }, 30);
}

function onLegendHover(idx) {
  hoveredDim = idx;
  drawRadar();
  highlightCard(idx);
}

function onLegendLeave(idx) {
  hoveredDim = null;
  drawRadar();
  highlightCard(null);
}

function highlightCard(idx) {
  document.querySelectorAll('.dim-card').forEach((el, i) => {
    if (idx === null) {
      el.style.opacity = '';
    } else {
      el.style.opacity = i === idx ? '1' : '0.4';
    }
  });
}

function onDimClick(idx) {
  if (selectedDim === idx) {
    closeDetail();
    return;
  }
  selectedDim = idx;
  drawRadar();

  // 高亮卡片
  document.querySelectorAll('.dim-card').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });

  // 图例高亮
  document.querySelectorAll('.legend-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // 打开详情
  showDetail(idx);
}

function showDetail(idx) {
  const d = DIMENSIONS[idx];
  const detail = document.getElementById('dimDetail');

              <div class="sub-dim-fill" style="width:0%;background:${d.color}" data-target="${sub.score}"></div>

    detail.querySelectorAll('.sub-dim-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });

}

function closeDetail() {
  selectedDim = null;
  document.getElementById('dimDetail').classList.remove('open');
  document.querySelectorAll('.dim-card').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  drawRadar();
}

// 雷达图鼠标交互
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const cx = canvas.clientWidth / 2;
  const cy = canvas.clientHeight / 2;
  const maxR = Math.min(cx, cy) * 0.72;
  const n = DIMENSIONS.length;

  let closestIdx = null;
  let closestDist = Infinity;

  DIMENSIONS.forEach((dim, i) => {
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const r = (dim.score / 100) * maxR;
    const px = cx + r * Math.cos(angle);
    const py = cy + r * Math.sin(angle);
    const dist = Math.sqrt((mx - px) ** 2 + (my - py) ** 2);
    if (dist < 20 && dist < closestDist) {
      closestDist = dist;
      closestIdx = i;
    }
  });

  if (closestIdx !== hoveredDim) {
    hoveredDim = closestIdx;
    drawRadar();
    highlightCard(hoveredDim);
    canvas.style.cursor = closestIdx !== null ? 'pointer' : 'default';
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredDim = null;
  drawRadar();
  highlightCard(null);
});

canvas.addEventListener('click', (e) => {
  if (hoveredDim !== null) onDimClick(hoveredDim);
});

  renderAbilities();

}

});
